communication:
  mavlink:
    enabled: true
    # Serial examples:
    # connection_string: /dev/ttyAMA0
    # baud: 57600
    #
    # UDP examples:
    # connection_string: udpout:127.0.0.1:14550
    # connection_string: udp:127.0.0.1:14550
    # Listen for Pixhawk/PX4 telemetry routed to this Raspberry Pi:
    connection_string: udpin:0.0.0.0:14550
    baud: 57600
    heartbeat_timeout_s: 0
    auto_request_streams: true
    request_stream_rate_hz: 5
    stream_request_interval_s: 5.0
    # If Pixhawk telemetry worked once and then stopped, keep reconnect enabled.
    reconnect_enabled: true
    heartbeat_loss_timeout_s: 8.0
    no_message_timeout_s: 8.0
    reconnect_interval_s: 3.0
    send_statustext: true
    statustext_min_interval_s: 1.0
