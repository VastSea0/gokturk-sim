camera:
  width: 640
  height: 480
  fps: 20
  format: BGR888
  warmup_frames: 5
  controls:
    # Leave auto modes on for first bring-up. For repeatable color tests,
    # disable AE/AWB and set exposure_time_us/analogue_gain after calibration.
    awb_enable: true
    ae_enable: true
    exposure_time_us: null
    analogue_gain: null

processing:
  resize_width: 640
  max_fps: 20

detection:
  color:
    min_area_px: 500
    max_area_fraction: 0.50
    min_color_fill: 0.35
    max_aspect_ratio: 4.0
    blur_kernel_size: 3
    morph_kernel_size: 7
    morph_iterations: 2
    max_markers_per_color: 3
    use_clahe: true
    red_hsv_ranges:
      - lower: [0, 80, 50]
        upper: [12, 255, 255]
      - lower: [165, 80, 50]
        upper: [179, 255, 255]
    blue_hsv_ranges:
      - lower: [95, 80, 40]
        upper: [135, 255, 255]
    red_dominance_min: 0.12
    blue_dominance_min: 0.10
    min_channel_value: 40
    red_lab_a_min: 148
    blue_lab_b_max: 112
  hsv:
    min_area_px: 400
    max_area_fraction: 0.65
    aspect_ratio_min: 0.25
    aspect_ratio_max: 4.00
    approx_epsilon_factor: 0.06
    require_quadrilateral: false
    min_vertices: 3
    max_vertices: 10
    min_extent: 0.20
    morph_kernel_size: 5
    morph_iterations: 1
    max_markers_per_color: 8
    red_ranges:
      - lower: [0, 90, 70]
        upper: [10, 255, 255]
      - lower: [170, 90, 70]
        upper: [179, 255, 255]
    blue_ranges:
      - lower: [88, 45, 30]
        upper: [148, 255, 255]
  yolo:
    task: detect
    weights_path: models/best.pt
    confidence_threshold: 0.35
    iou_threshold: 0.45
    image_size: 320
    class_names:
      0: red_marker
      1: blue_marker
  yolo_seg:
    task: segment
    weights_path: models/best-seg.pt
    confidence_threshold: 0.30
    iou_threshold: 0.45
    image_size: 320
    class_names:
      0: red_marker
      1: blue_marker

tracking:
  enabled: true
  max_distance_px: 90
  max_missed: 6
  smoothing_alpha: 0.45
  stale_confidence_decay: 0.65

geometry:
  # MVP assumption: nadir-looking camera, flat ground, known altitude.
  # Replace these with calibrated intrinsics/extrinsics before real flight tests.
  default_altitude_m: 20.0
  marker_size_m: 2.0
  camera:
    hfov_deg: 66.0
    vfov_deg: 41.0
    mount_roll_deg: 0.0
    mount_pitch_deg: 0.0
    mount_yaw_deg: 0.0

communication:
  console:
    enabled: true
    print_empty_frames: false
  json:
    enabled: true
    path: logs/marker_detections.jsonl
  udp:
    enabled: false
    host: 127.0.0.1
    port: 15000
    broadcast: false
  mavlink:
    enabled: false
    connection_string: udpout:127.0.0.1:14550
    baud: 57600
    heartbeat_timeout_s: 0
    send_statustext: true
    statustext_min_interval_s: 1.0

debug:
  draw: false
  view: overlay
  show_window: false
  save_debug_frames: false
  debug_frame_dir: logs/debug_frames
  debug_frame_interval: 30

gui:
  update_interval_ms: 33
  default_video: sample_data/test.mp4
